name: 🌐 Test deployment

permissions:
  contents: read
  pull-requests: write

on:
  pull_request:
    branches: main
    paths:
      - "@robopo/docs/**"

jobs:
  test-deploy:
    name: Test deployment
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: 🐣 Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: canary

      - name: 📦 Install dependencies
        run: bun i --frozen-lockfile
      - name: 🌐 Test build website
        run: bun docs-build
