[tools]
bun = "latest"
ffmpeg = "latest"
rumdl = "latest"
pitchfork = "latest"

[tasks.lint]
run = ["bun lint:fix --unsafe", "mise lint:md"]

[tasks."lint:md"]
description = "Check markdown files for linting issues"
run = "rumdl check --fix ."

[tasks.setup-env]
description = "Setup environment variables for @robopo/web"
run = "bun run setup-env"

[tasks.update]
description = "Update bun dependencies and reinstall"
run = ["bun update", "bun i", "mise deps"]

[deps.bun]
auto = true

[hooks]
enter = ["mise upgrade -q", "mise deps -q"]

[settings]
experimental = true
